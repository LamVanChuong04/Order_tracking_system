spring:
  application:
    name: order_tracking_system
  datasource:
    url: ${DBMS_CONNECTION:jdbc:mysql://localhost:3306/order_tracking_system}
    username: ${DBMS_USERNAME:root}
    password: ${DBMS_PASSWORD:250104}
  jpa:
    hibernate:
      ddl-auto: update
    database: mysql
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format-sql: true

logging:
  file:
    name: ./log/app.log
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE